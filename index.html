<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAMEX - Gestión de Inventarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginOverlay" class="d-flex align-items-center justify-content-center">
    <div class="card shadow-lg p-4 text-center" style="max-width: 400px; width: 90%;">
        <div class="vitamex-logo-bg mx-auto mb-3"></div>
        <h3 class="text-vitamex mb-4">Acceso Restringido</h3>
        <form id="formLogin">
            <input type="text" id="loginUser" class="form-control mb-3" placeholder="ID de Empleado" required>
            <input type="password" id="loginPass" class="form-control mb-3" placeholder="Contraseña" required>
            <button type="submit" class="btn btn-vitamex-save w-100">INGRESAR</button>
        </form>
        <div id="loginError" class="text-danger mt-3 d-none">Credenciales incorrectas.</div>
    </div>
</div>

<div id="mainContent" class="d-none">
    <nav class="navbar navbar-dark navbar-vitamex shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="vitamex-logo-bg me-3" style="width: 50px; height: 50px; border-width: 1px;"></div>
                <strong>VITAMEX S.A. de C.V.</strong>
            </a>
        </div>
    </nav>
    
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm p-3">
                    <h5 class="text-vitamex mb-3">Registrar Movimiento</h5>
                    <form id="formMovimiento">
                        <select id="idProducto" class="form-select mb-3" required><option>Cargando productos...</option></select>
                        <select id="tipo" class="form-select mb-3"><option value="Entrada">Entrada</option><option value="Salida">Salida</option></select>
                        <input type="number" id="cantidad" class="form-control mb-3" placeholder="Cantidad" required>
                        <select id="departamento" class="form-select mb-3" required><option>Cargando áreas...</option></select>
                        <select id="responsable" class="form-select mb-3" required><option>Cargando personal...</option></select>
                        <button type="submit" class="btn btn-vitamex-save w-100">GUARDAR</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card shadow-sm p-3">
                    <div class="d-flex justify-content-between mb-3">
                        <h5 class="text-vitamex">Inventario Real</h5>
                        <button class="btn btn-sm btn-vitamex-update" onclick="cargarInventario()">🔄 Actualizar</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover table-vitamex"><thead class="table-light"><tr><th>ID</th><th>Producto</th><th>Stock</th><th>Área</th></tr></thead><tbody id="tablaCuerpo"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
